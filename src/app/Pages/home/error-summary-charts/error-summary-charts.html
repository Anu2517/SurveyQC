<div class="header">
  <button class="back-btn" (click)="goBack()">
    <i class="pi pi-arrow-left"></i>
  </button>
  <h2 class="title">{{ selectedView }}</h2>
  <button 
    pButton 
    type="button" 
    label="View Report"
    icon="pi pi-eye"
    class="p-button-primary"
    (click)="router.navigate(['view-report'])">
  </button>
  
  <p-select
    [options]="viewOptions"
    [(ngModel)]="selectedView"
    optionLabel="label"
    optionValue="value"
    (onChange)="onViewChange()"
    panelStyleClass="view-selector-panel"
    class="view-selector"
    appendTo="body">
  </p-select>
</div>

<div class="chart-wrapper">
  @if (selectedView === 'Overall Summary') {
    <div class="chart-container">
      <div class="chart-heading">Overall Summary</div>
      <div echarts [options]="chartOption" class="chart"></div>
    </div>
  } @else {
    <div class="provider-grid">
      @for (provider of providerCharts; track provider.title) {
        <div class="chart-container">
          <div class="chart-heading">{{ provider.title }}</div>
          <div echarts [options]="provider.option" class="chart"></div>
        </div>
      }
    </div>
  }
</div>
